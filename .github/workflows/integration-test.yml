name: Integration Test

on:
  workflow_dispatch:
    inputs:
      repository_url:
        description: 'Drupal project repository URL'
        required: true
        type: string
      branch:
        description: 'Target branch in the project repository'
        required: false
        default: 'main'
        type: string
      php_version:
        description: 'PHP version'
        required: false
        default: '8.3'
        type: choice
        options:
          - '8.2'
          - '8.3'
          - '8.4'
      dry_run:
        description: 'Skip branch and MR creation'
        required: false
        default: true
        type: boolean
      security:
        description: 'Security-only updates'
        required: false
        default: false
        type: boolean
      verbose:
        description: 'Verbose logging'
        required: false
        default: false
        type: boolean

jobs:
  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: drupdater:test
          build-args: |
            PHP_VERSION=${{ inputs.php_version }}

      - name: Run drupdater
        env:
          REPO_TOKEN: ${{ secrets.DRUPDATER_TEST_TOKEN }}
          REPOSITORY_URL: ${{ inputs.repository_url }}
          BRANCH: ${{ inputs.branch }}
          DRY_RUN: ${{ inputs.dry_run }}
          SECURITY: ${{ inputs.security }}
          VERBOSE: ${{ inputs.verbose }}
        run: |
          args=(
            --clone
            --repository-url "$REPOSITORY_URL"
            --branch "$BRANCH"
          )
          [ "$DRY_RUN" = "true" ] && args+=(--dry-run)
          [ "$SECURITY" = "true" ] && args+=(--security)
          [ "$VERBOSE" = "true" ] && args+=(--verbose)
          docker run --rm drupdater:test "$REPO_TOKEN" "${args[@]}"

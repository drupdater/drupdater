name: Integration Test

on:
  workflow_dispatch:
    inputs:
      repository_url:
        description: 'Drupal project repository URL'
        required: true
        type: string
      branch:
        description: 'Target branch in the project repository'
        required: false
        default: 'main'
        type: string
      php_version:
        description: 'PHP version'
        required: false
        default: '8.3'
        type: choice
        options:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
      dry_run:
        description: 'Skip branch and MR creation'
        required: false
        default: true
        type: boolean
      security:
        description: 'Security-only updates'
        required: false
        default: false
        type: boolean
      verbose:
        description: 'Verbose logging'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: drupdater:test
          build-args: |
            PHP_VERSION=${{ inputs.php_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clone project
        env:
          REPO_TOKEN: ${{ secrets.DRUPDATER_TEST_TOKEN }}
          REPOSITORY_URL: ${{ inputs.repository_url }}
          BRANCH: ${{ inputs.branch }}
        run: |
          git -c credential.helper='!f(){ echo username=oauth2; echo "password=$REPO_TOKEN"; };f' \
            clone --branch "$BRANCH" --depth 1 "$REPOSITORY_URL" ./drupal-project

      - name: Run drupdater
        env:
          REPO_TOKEN: ${{ secrets.DRUPDATER_TEST_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          SECURITY: ${{ inputs.security }}
          VERBOSE: ${{ inputs.verbose }}
        run: |
          args=(--working-dir /workspace)
          [ "$DRY_RUN" = "true" ] && args+=(--dry-run)
          [ "$SECURITY" = "true" ] && args+=(--security)
          [ "$VERBOSE" = "true" ] && args+=(--verbose)
          docker run --rm \
            -v "$(pwd)/drupal-project:/workspace" \
            drupdater:test "$REPO_TOKEN" "${args[@]}"
